{# Floating AI career chat — same endpoint as profile page; uses GEMINI_API_KEY server-side. #}
<script>
(function () {
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    // Get language-specific strings
    function getChatStrings() {
        // Check if we're on a Tamil page by looking at the URL or body class
        const isTamil = document.body.classList.contains('tamil') || 
                       window.location.pathname.includes('?lang=ta') ||
                       (document.cookie && document.cookie.includes('ui_lang=ta'));
        
        if (isTamil) {
            return {
                open: 'Career chat',
                you: 'நீங்கள்:',
                bot: 'Bot:',
                typing: 'Bot எழுதுகிறது...',
                error: 'AI உரையாடலில் பிழை. பின்னர் முயற்சிக்கவும்.'
            };
        }
        return {
            open: 'Career chat',
            you: 'You:',
            bot: 'Bot:',
            typing: 'Bot is typing...',
            error: 'Unable to contact AI right now.'
        };
    }

    document.addEventListener('DOMContentLoaded', function () {
        const strings = getChatStrings();
        const chatToggle = document.createElement('button');
        chatToggle.type = 'button';
        chatToggle.className = 'btn btn-primary';
        chatToggle.setAttribute('aria-label', 'Open career chat');
        chatToggle.setAttribute('title', strings.open);
        chatToggle.style.position = 'fixed';
        chatToggle.style.right = '20px';
        chatToggle.style.bottom = '20px';
        chatToggle.style.zIndex = '40';
        chatToggle.style.width = '56px';
        chatToggle.style.height = '56px';
        chatToggle.style.minWidth = '56px';
        chatToggle.style.padding = '0';
        chatToggle.style.borderRadius = '50%';
        chatToggle.style.boxShadow = 'var(--shadow-lg)';
        chatToggle.innerHTML = '<i data-lucide="message-circle" class="icon" style="width:26px;height:26px;" aria-hidden="true"></i>';

        const chatBox = document.createElement('div');
        chatBox.style.position = 'fixed';
        chatBox.style.right = '20px';
        chatBox.style.bottom = '86px';
        chatBox.style.width = '320px';
        chatBox.style.maxHeight = '420px';
        chatBox.style.background = 'white';
        chatBox.style.borderRadius = '16px';
        chatBox.style.boxShadow = 'var(--shadow-soft)';
        chatBox.style.display = 'none';
        chatBox.style.overflow = 'hidden';
        chatBox.style.zIndex = '50';

        chatBox.innerHTML = `
            <div style="padding: 12px 16px; border-bottom: 1px solid var(--gray-100); background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white;">
                <strong>AI Career Chatbot</strong>
            </div>
            <div id="chat-messages" style="padding: 10px 12px; height: 260px; overflow-y: auto; font-size: 14px; background: #f9fafb;">
                <div style="margin-bottom: 8px; color: var(--gray-700);">
                    <strong>Bot:</strong> Ask me anything about careers, courses, or skills.
                </div>
            </div>
            <form id="chat-form" style="display:flex; border-top:1px solid var(--gray-100);">
                <input id="chat-input" type="text" placeholder="Type your question..." style="flex:1; border:none; padding:10px 8px; font-size:14px; outline:none;">
                <button type="submit" style="border:none; padding:0 12px; background:transparent; color:var(--primary-blue); font-weight:600; cursor:pointer;">Send</button>
            </form>
        `;

        document.body.appendChild(chatToggle);
        document.body.appendChild(chatBox);

        if (window.lucide && typeof lucide.createIcons === 'function') {
            lucide.createIcons();
        }

        chatToggle.addEventListener('click', function () {
            chatBox.style.display = chatBox.style.display === 'none' ? 'block' : 'none';
        });

        const chatForm = chatBox.querySelector('#chat-form');
        const chatInput = chatBox.querySelector('#chat-input');
        const chatMessages = chatBox.querySelector('#chat-messages');

        chatForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            const userDiv = document.createElement('div');
            userDiv.style.marginBottom = '6px';
            userDiv.innerHTML = '<strong>' + strings.you + '</strong> ' + text;
            chatMessages.appendChild(userDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            chatInput.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.style.marginBottom = '6px';
            loadingDiv.style.color = 'var(--gray-500)';
            loadingDiv.textContent = strings.typing;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const resp = await fetch('{% url "chatbot" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || ''
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await resp.json();
                chatMessages.removeChild(loadingDiv);

                const botDiv = document.createElement('div');
                botDiv.style.marginBottom = '6px';
                botDiv.style.color = 'var(--gray-700)';
                botDiv.innerHTML = '<strong>' + strings.bot + '</strong> ' + (data.reply || '[No reply]');
                chatMessages.appendChild(botDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (err) {
                chatMessages.removeChild(loadingDiv);
                const errDiv = document.createElement('div');
                errDiv.style.marginBottom = '6px';
                errDiv.style.color = '#b91c1c';
                errDiv.innerHTML = '<strong>Error:</strong> ' + strings.error;
                chatMessages.appendChild(errDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });
    });
})();
</script>
